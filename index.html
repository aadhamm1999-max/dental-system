<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>العيادة التخصصية لطب الفم والأسنان</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo">🦷</div>
        <div>
          <h1>العيادة التخصصية</h1>
          <p>لطب الفم والأسنان</p>
        </div>
      </div>
      <nav>
        <button class="nav-btn active">لوحة التحكم</button>
        <button class="nav-btn">المرضى</button>
        <button class="nav-btn">المواعيد</button>
        <button class="nav-btn">الفواتير</button>
        <button class="nav-btn">الأشعة</button>
      </nav>
    </aside>

    <main class="content">
      <header class="topbar">
        <div>
          <h2>إدارة المرضى</h2>
          <p>نسخة جاهزة للرفع والتشغيل</p>
        </div>
      </header>

      <section class="cards">
        <div class="card"><span>عدد المرضى</span><strong id="patientsCount">0</strong></div>
        <div class="card"><span>الحالة</span><strong id="apiStatus">جاري التحقق...</strong></div>
      </section>

      <section class="panel">
        <h3>إضافة مريض</h3>
        <div class="form-grid">
          <input id="name" placeholder="اسم المريض" />
          <input id="phone" placeholder="رقم الهاتف" />
          <input id="age" type="number" placeholder="العمر" />
          <input id="notes" placeholder="ملاحظات" />
        </div>
        <button class="primary" id="addBtn">إضافة</button>
        <p id="msg"></p>
      </section>

      <section class="panel">
        <h3>قائمة المرضى</h3>
        <div id="patientsList" class="patients-list"></div>
      </section>
    </main>
  </div>

  <script src="/app.js"></script>
</body>
</html>
